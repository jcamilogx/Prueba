<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude AI para Excel</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <style>
    :root {
      --primary: #d97706; --primary-hover: #b45309;
      --bg: #0c0c0c; --surface: #161616; --surface-2: #1e1e1e; --surface-3: #2a2a2a;
      --border: #333; --text: #e8e8e8; --text-muted: #aaa; --text-dim: #666;
      --success: #22c55e; --error: #ef4444; --info: #60a5fa;
      --accent-green: #10b981; --accent-rose: #fb7185;
      --user-bg: #1c1708; --user-border: #3d3018; --scrollbar: #444;
      --table-header: #1a1a2e; --table-row-alt: rgba(255,255,255,.02); --table-border: #2a2a2a;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI',-apple-system,sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; font-size:13px; line-height:1.5; }

    .header { background:var(--surface); border-bottom:1px solid var(--border); padding:10px 14px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .header-left { display:flex; align-items:center; gap:8px; }
    .header-logo { width:24px; height:24px; background:linear-gradient(135deg,#d97706,#f59e0b); border-radius:7px; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:13px; color:#000; box-shadow:0 2px 8px rgba(217,119,6,.3); }
    .header-title { font-weight:600; font-size:14px; }
    .header-actions { display:flex; gap:2px; }
    .icon-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:6px; border-radius:6px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .icon-btn:hover { background:var(--surface-3); color:var(--text); }
    .icon-btn svg { width:15px; height:15px; }

    .status-bar { background:var(--surface); border-bottom:1px solid var(--border); padding:5px 14px; font-size:11px; display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .status-dot { width:6px; height:6px; border-radius:50%; background:var(--text-dim); flex-shrink:0; }
    .status-dot.connected { background:var(--success); box-shadow:0 0 6px rgba(34,197,94,.4); }
    .status-dot.error { background:var(--error); }
    .status-text { color:var(--text-muted); }

    .config-panel { background:var(--surface); border-bottom:1px solid var(--border); overflow:hidden; max-height:0; transition:max-height .3s ease; }
    .config-panel.open { max-height:500px; }
    .config-inner { padding:12px 14px; }
    .config-inner h3 { font-size:11px; font-weight:700; margin-bottom:10px; color:var(--primary); text-transform:uppercase; letter-spacing:.8px; }
    .field { margin-bottom:8px; }
    .field label { display:block; font-size:11px; color:var(--text-muted); margin-bottom:2px; font-weight:500; }
    .field input,.field select { width:100%; background:var(--surface-2); border:1px solid var(--border); color:var(--text); padding:7px 10px; border-radius:6px; font-size:12px; font-family:inherit; transition:border-color .15s; }
    .field input:focus,.field select:focus { outline:none; border-color:var(--primary); }
    .field input::placeholder { color:var(--text-dim); }
    .field .hint { font-size:10px; color:var(--text-dim); margin-top:2px; }
    .btn-save { background:linear-gradient(135deg,#d97706,#f59e0b); color:#000; border:none; padding:8px 16px; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; width:100%; }
    .btn-save:hover { opacity:.9; }

    .chat-area { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:14px; }
    .chat-area::-webkit-scrollbar { width:4px; }
    .chat-area::-webkit-scrollbar-track { background:transparent; }
    .chat-area::-webkit-scrollbar-thumb { background:var(--scrollbar); border-radius:2px; }

    .welcome { text-align:center; padding:24px 10px; color:var(--text-muted); }
    .welcome-icon { width:52px; height:52px; margin:0 auto 14px; background:linear-gradient(135deg,var(--surface-2),var(--surface-3)); border:1px solid var(--border); border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:24px; }
    .welcome h2 { font-size:16px; color:var(--text); margin-bottom:4px; font-weight:600; }
    .welcome p { font-size:12px; line-height:1.6; }
    .quick-actions { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:14px; }
    .quick-btn { background:var(--surface-2); border:1px solid var(--border); color:var(--text-muted); padding:8px 10px; border-radius:8px; font-size:11px; cursor:pointer; text-align:left; transition:all .15s; line-height:1.4; }
    .quick-btn:hover { border-color:var(--primary); color:var(--text); background:var(--surface-3); }
    .quick-btn strong { display:block; color:var(--text); font-size:11px; margin-bottom:2px; }

    .message { padding:10px 12px; border-radius:10px; max-width:100%; word-wrap:break-word; animation:fadeIn .25s ease; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    .message.user { background:var(--user-bg); border:1px solid var(--user-border); }
    .message.assistant { background:var(--surface); border:1px solid var(--border); }
    .message.system { background:var(--surface-2); border:1px solid var(--border); font-size:11px; padding:8px 12px; border-radius:8px; }
    .msg-header { display:flex; align-items:center; gap:6px; margin-bottom:6px; font-size:11px; }
    .msg-header .role { font-weight:700; color:var(--primary); }
    .msg-header .time { color:var(--text-dim); font-weight:400; margin-left:auto; font-size:10px; }
    .msg-body { font-size:13px; line-height:1.65; }
    .msg-body p { margin-bottom:8px; }
    .msg-body p:last-child { margin-bottom:0; }
    .msg-body strong { color:#fff; }
    .msg-body pre { background:#0a0a0a; border:1px solid var(--border); border-radius:8px; padding:10px 12px; overflow-x:auto; margin:8px 0; font-size:11px; font-family:'Cascadia Code','Fira Code',monospace; }
    .msg-body code { background:var(--surface-3); padding:2px 5px; border-radius:4px; font-size:11.5px; font-family:'Cascadia Code','Fira Code',monospace; }
    .msg-body pre code { background:none; padding:0; }

    .rich-table { width:100%; border-collapse:separate; border-spacing:0; margin:10px 0; border-radius:8px; overflow:hidden; border:1px solid var(--table-border); font-size:12px; }
    .rich-table thead th { background:var(--table-header); color:var(--primary); padding:8px 10px; text-align:left; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.4px; border-bottom:2px solid var(--primary); white-space:nowrap; }
    .rich-table tbody td { padding:7px 10px; border-bottom:1px solid var(--table-border); color:var(--text); vertical-align:top; }
    .rich-table tbody tr:nth-child(even) { background:var(--table-row-alt); }
    .rich-table tbody tr:hover { background:rgba(217,119,6,.06); }
    .rich-table tbody tr:last-child td { border-bottom:none; }
    .rich-table .num { text-align:right; font-variant-numeric:tabular-nums; font-family:'Cascadia Code',monospace; font-size:11.5px; }
    .rich-table .negative { color:var(--accent-rose); }

    .stat-cards { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin:10px 0; }
    .stat-card { background:var(--surface-2); border:1px solid var(--table-border); border-radius:8px; padding:10px 12px; }
    .stat-card .label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
    .stat-card .value { font-size:18px; font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; }
    .stat-card .sub { font-size:10px; color:var(--accent-green); margin-top:2px; }
    .stat-card .sub.neg { color:var(--accent-rose); }

    .typing-indicator span { display:inline-block; width:5px; height:5px; background:var(--primary); border-radius:50%; margin:0 2px; animation:bounce .6s infinite alternate; }
    .typing-indicator span:nth-child(2) { animation-delay:.2s; }
    .typing-indicator span:nth-child(3) { animation-delay:.4s; }
    @keyframes bounce { to{transform:translateY(-6px);opacity:.3} }

    .context-bar { background:var(--surface); border-top:1px solid var(--border); padding:5px 14px; display:flex; align-items:center; gap:6px; flex-shrink:0; font-size:11px; }
    .context-badge { background:var(--surface-2); border:1px solid var(--border); padding:2px 8px; border-radius:10px; color:var(--text-muted); display:flex; align-items:center; gap:4px; }
    .context-badge svg { width:11px; height:11px; }

    .input-area { background:var(--surface); border-top:1px solid var(--border); padding:10px 14px; flex-shrink:0; }
    .input-row { display:flex; gap:6px; align-items:flex-end; }
    .input-wrapper { flex:1; background:var(--surface-2); border:1px solid var(--border); border-radius:10px; padding:0 10px; transition:border-color .15s; }
    .input-wrapper:focus-within { border-color:var(--primary); }
    .input-wrapper textarea { width:100%; background:none; border:none; color:var(--text); font-family:inherit; font-size:13px; padding:9px 0; resize:none; max-height:120px; line-height:1.5; }
    .input-wrapper textarea:focus { outline:none; }
    .input-wrapper textarea::placeholder { color:var(--text-dim); }
    .send-btn { background:linear-gradient(135deg,#d97706,#f59e0b); border:none; color:#000; width:36px; height:36px; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; flex-shrink:0; }
    .send-btn:hover { opacity:.9; transform:scale(1.03); }
    .send-btn:disabled { opacity:.25; cursor:not-allowed; transform:none; }
    .send-btn svg { width:16px; height:16px; }
    .input-hint { font-size:10px; color:var(--text-dim); margin-top:4px; text-align:center; }

    .toast-container { position:fixed; top:50px; right:8px; z-index:999; display:flex; flex-direction:column; gap:4px; }
    .toast { background:var(--surface-3); border:1px solid var(--border); padding:8px 12px; border-radius:8px; font-size:12px; animation:slideIn .25s ease; max-width:240px; box-shadow:0 4px 12px rgba(0,0,0,.4); }
    .toast.success { border-left:3px solid var(--success); }
    .toast.error { border-left:3px solid var(--error); }
    .toast.info { border-left:3px solid var(--info); }
    @keyframes slideIn { from{transform:translateX(100%);opacity:0} }

    .op-results { margin:4px 0; }
    .op-item { display:flex; align-items:center; gap:6px; padding:3px 0; font-size:12px; }
    .op-icon { width:16px; height:16px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:10px; flex-shrink:0; }
    .op-icon.ok { background:rgba(34,197,94,.15); color:var(--success); }
    .op-icon.err { background:rgba(239,68,68,.15); color:var(--error); }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left"><div class="header-logo">C</div><span class="header-title">Claude AI</span></div>
    <div class="header-actions">
      <button class="icon-btn" id="btnConfig" title="Configuración"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></button>

  </div></div>

  <div class="context-bar">
    <span style="color:var(--text-dim)">Contexto:</span>

<script>
// ═══════════════════════════════════════════════════════
//  CLAUDE AI PARA EXCEL v2.0
// ═══════════════════════════════════════════════════════
let config={resource:'',apiKey:'',model:'claude-sonnet-4-6',systemPrompt:''};
let conversationHistory=[], isProcessing=false, officeReady=false;
const SMALL_SHEET_LIMIT=2000, SAMPLE_HEAD=50, SAMPLE_TAIL=30, SAMPLE_RANDOM=70, CHUNK=5000, MAX_CTX=120000;

Office.onReady(function(info){
  if(info.host===Office.HostType.Excel){officeReady=true;updateStatus('connected','Excel conectado');loadConfig();setupEvents();updateCtxInfo();}
  else updateStatus('error','Solo funciona en Excel');
});

// ── CONFIG ──
function loadConfig(){try{const s=localStorage.getItem('claude_xl_cfg');if(s){config=JSON.parse(s);document.getElementById('cfgResource').value=config.resource||'';document.getElementById('cfgApiKey').value=config.apiKey||'';document.getElementById('cfgModel').value=config.model||'claude-sonnet-4-6';document.getElementById('cfgSystem').value=config.systemPrompt||'';if(config.resource&&config.apiKey)updateStatus('connected',`Conectado: ${config.model}`);}}catch(e){}}
function saveConfig(){
  config.resource=document.getElementById('cfgResource').value.trim();config.apiKey=document.getElementById('cfgApiKey').value.trim();
  config.model=document.getElementById('cfgModel').value;config.systemPrompt=document.getElementById('cfgSystem').value.trim();
  if(!config.resource||!config.apiKey){showToast('Completa recurso y API key','error');return;}
  localStorage.setItem('claude_xl_cfg',JSON.stringify(config));updateStatus('connected',`Conectado: ${config.model}`);
  document.getElementById('configPanel').classList.remove('open');showToast('Guardado','success');testConn();
}
async function testConn(){try{const r=await fetch(`https://${config.resource}.services.ai.azure.com/anthropic/v1/messages`,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':config.apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:config.model,max_tokens:50,messages:[{role:'user',content:'OK'}]})});if(r.ok){updateStatus('connected',`Conectado: ${config.model}`);showToast('Conexión exitosa','success');}else{updateStatus('error','Error');showToast(`Error ${r.status}`,'error');}}catch(e){updateStatus('error','Sin conexión');showToast(e.message,'error');}}

// ── EVENTS ──
function setupEvents(){
  document.getElementById('btnConfig').addEventListener('click',()=>document.getElementById('configPanel').classList.toggle('open'));
  document.getElementById('btnSaveConfig').addEventListener('click',saveConfig);
  document.getElementById('btnClear').addEventListener('click',clearChat);
  document.getElementById('btnSend').addEventListener('click',sendMessage);
  const inp=document.getElementById('userInput');
  inp.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';document.getElementById('btnSend').disabled=!this.value.trim()||isProcessing;});
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();if(this.value.trim()&&!isProcessing)sendMessage();}});
  document.querySelectorAll('.quick-btn').forEach(b=>b.addEventListener('click',()=>{document.getElementById('userInput').value=b.dataset.prompt;document.getElementById('btnSend').disabled=false;sendMessage();}));
}

// ═══════════════════════════════════════════════════════
//  LECTURA INTELIGENTE
// ═══════════════════════════════════════════════════════
async function readFullWorkbook(){
  if(!officeReady)return{error:'Office no listo'};
  return Excel.run(async ctx=>{
    const sheets=ctx.workbook.worksheets;sheets.load('items/name');await ctx.sync();
    const bd={sheets:[],totalCells:0,strategy:{}},meta=[];
    for(const s of sheets.items){const u=s.getUsedRangeOrNullObject(true);u.load(['address','rowCount','columnCount']);meta.push({sheet:s,ur:u});}
    await ctx.sync();
    let totalR=0;const ms=[];
    for(const{sheet,ur}of meta){if(ur.isNullObject)ms.push({name:sheet.name,empty:true});else{totalR+=ur.rowCount;ms.push({name:sheet.name,empty:false,address:ur.address,rows:ur.rowCount,cols:ur.columnCount,sheet});}}
    for(const m of ms){
      if(m.empty){bd.sheets.push({name:m.name,empty:true,data:[]});continue;}
      const si={name:m.name,empty:false,address:m.address,rows:m.rows,cols:m.cols};
      bd.totalCells+=m.rows*m.cols;
      if(m.rows<=SMALL_SHEET_LIMIT){si.readStrategy='complete';si.data=await readRange(ctx,m.sheet,1,m.rows,m.cols);}
      else{
        si.readStrategy='sampled';si.totalRows=m.rows;
        const he=Math.min(SAMPLE_HEAD,m.rows);si.headData=await readRange(ctx,m.sheet,1,he,m.cols);
        const ts=Math.max(m.rows-SAMPLE_TAIL+1,he+1);
        if(ts<=m.rows){si.tailData=await readRange(ctx,m.sheet,ts,m.rows,m.cols);si.tailStartRow=ts;}
        const ms2=he+1,me=ts-1;
        if(me>ms2){const idx=rndIdx(ms2,me,SAMPLE_RANDOM);si.sampleData=[];si.sampleRows=[];const blks=groupContig(idx);for(const b of blks){const d=await readRange(ctx,m.sheet,b[0],b[b.length-1],m.cols);for(let i=0;i<d.length;i++)if(idx.includes(b[0]+i)){si.sampleRows.push(b[0]+i);si.sampleData.push(d[i]);}}}
        si.columnStats=await colStats(ctx,m.sheet,m.rows,m.cols);
      }
      bd.sheets.push(si);
    }
    bd.strategy={limit:SMALL_SHEET_LIMIT,totalRows:totalR};return bd;
  });
}
async function readRange(ctx,sheet,s,e,cols){const rows=[],ce=colL(Math.min(cols,100));for(let r=s;r<=e;r+=CHUNK){const be=Math.min(r+CHUNK-1,e),rng=sheet.getRange(`A${r}:${ce}${be}`);rng.load('text');await ctx.sync();if(rng.text)rows.push(...rng.text);}return rows;}
async function readArbitrary(sn,ra){return Excel.run(async ctx=>{const r=ctx.workbook.worksheets.getItem(sn).getRange(ra);r.load(['text','values','rowCount','columnCount','address']);await ctx.sync();return{address:r.address,rows:r.rowCount,cols:r.columnCount,data:r.text||r.values};});}
async function colStats(ctx,sheet,tr,tc){const st=[],mc=Math.min(tc,30),hr=sheet.getRange(`A1:${colL(mc)}1`);hr.load('text');const sr=sheet.getRange(`A2:${colL(mc)}${Math.min(20,tr)}`);sr.load('values');await ctx.sync();const hd=hr.text?hr.text[0]:[];for(let c=0;c<mc;c++){const n=hd[c]||`Col${c+1}`,sv=sr.values?sr.values.map(r=>r[c]).filter(v=>v!==null&&v!==''):[],nv=sv.filter(v=>typeof v==='number'||!isNaN(Number(v)));if(nv.length>sv.length*.5&&sv.length>0)st.push({column:n,type:'numeric',min:Math.min(...nv.map(Number)),max:Math.max(...nv.map(Number)),total:tr-1});else{const uv=[...new Set(sv.map(String))];st.push({column:n,type:'text',uniq:uv.length,samples:uv.slice(0,8)});}}return st;}
function rndIdx(s,e,n){const r=e-s+1;if(r<=n)return Array.from({length:r},(_,i)=>s+i);const idx=new Set();while(idx.size<n)idx.add(s+Math.floor(Math.random()*r));return[...idx].sort((a,b)=>a-b);}
function groupContig(a){if(!a.length)return[];const b=[[a[0]]];for(let i=1;i<a.length;i++){const l=b[b.length-1];if(a[i]-l[l.length-1]<=3){for(let f=l[l.length-1]+1;f<=a[i];f++)l.push(f);}else b.push([a[i]]);}return b;}

async function execOps(ops){const res=[];for(const o of ops){try{switch(o.action){
  case 'write_cells':await Excel.run(async c=>{const s=c.workbook.worksheets.getItem(o.sheet);s.getRange(o.startCell).getResizedRange(o.values.length-1,o.values[0].length-1).values=o.values;await c.sync();});res.push({s:'ok',d:`Escrito en ${o.sheet}!${o.startCell}`});break;
  case 'write_cell':await Excel.run(async c=>{c.workbook.worksheets.getItem(o.sheet).getRange(o.cell).values=[[o.value]];await c.sync();});res.push({s:'ok',d:`${o.sheet}!${o.cell} = ${o.value}`});break;
  case 'create_sheet':await Excel.run(async c=>{c.workbook.worksheets.add(o.name).activate();await c.sync();});res.push({s:'ok',d:`Hoja "${o.name}" creada`});break;
  case 'delete_rows':await Excel.run(async c=>{c.workbook.worksheets.getItem(o.sheet).getRange(`${o.startRow}:${o.startRow+o.count-1}`).delete(Excel.DeleteShiftDirection.up);await c.sync();});res.push({s:'ok',d:`${o.count} filas eliminadas`});break;
  case 'insert_rows':await Excel.run(async c=>{c.workbook.worksheets.getItem(o.sheet).getRange(`${o.startRow}:${o.startRow+o.count-1}`).insert(Excel.InsertShiftDirection.down);await c.sync();});res.push({s:'ok',d:`${o.count} filas insertadas`});break;
  case 'set_formula':await Excel.run(async c=>{c.workbook.worksheets.getItem(o.sheet).getRange(o.cell).formulas=[[o.formula]];await c.sync();});res.push({s:'ok',d:`Fórmula en ${o.sheet}!${o.cell}`});break;
  case 'auto_fit':await Excel.run(async c=>{const r=o.range?c.workbook.worksheets.getItem(o.sheet).getRange(o.range):c.workbook.worksheets.getItem(o.sheet).getUsedRange();r.format.autofitColumns();r.format.autofitRows();await c.sync();});res.push({s:'ok',d:`Autoajuste ${o.sheet}`});break;
  case 'sort_range':await Excel.run(async c=>{c.workbook.worksheets.getItem(o.sheet).getRange(o.range).sort.apply([{key:o.column||0,ascending:o.ascending!==false}]);await c.sync();});res.push({s:'ok',d:`Ordenado ${o.sheet}!${o.range}`});break;
  case 'clear_range':await Excel.run(async c=>{c.workbook.worksheets.getItem(o.sheet).getRange(o.range).clear();await c.sync();});res.push({s:'ok',d:`Limpiado ${o.range}`});break;
  case 'merge_cells':await Excel.run(async c=>{c.workbook.worksheets.getItem(o.sheet).getRange(o.range).merge();await c.sync();});res.push({s:'ok',d:`Fusionado ${o.range}`});break;
  case 'format_range':await Excel.run(async c=>{const r=c.workbook.worksheets.getItem(o.sheet).getRange(o.range),f=o.format;if(f.bold!==undefined)r.format.font.bold=f.bold;if(f.italic!==undefined)r.format.font.italic=f.italic;if(f.color)r.format.font.color=f.color;if(f.bgColor)r.format.fill.color=f.bgColor;if(f.fontSize)r.format.font.size=f.fontSize;if(f.fontName)r.format.font.name=f.fontName;if(f.numberFormat)r.numberFormat=[[f.numberFormat]];if(f.hAlign)r.format.horizontalAlignment=f.hAlign;if(f.vAlign)r.format.verticalAlignment=f.vAlign;if(f.wrapText)r.format.wrapText=true;if(f.borders)['EdgeTop','EdgeBottom','EdgeLeft','EdgeRight'].forEach(b=>r.format.borders.getItem(b).style='Continuous');if(f.borderColor)['EdgeTop','EdgeBottom','EdgeLeft','EdgeRight'].forEach(b=>{r.format.borders.getItem(b).style='Continuous';r.format.borders.getItem(b).color=f.borderColor;});await c.sync();});res.push({s:'ok',d:`Formato ${o.sheet}!${o.range}`});break;
  case 'create_chart':await Excel.run(async c=>{const sh=c.workbook.worksheets.getItem(o.sheet),rng=sh.getRange(o.dataRange),types={bar:Excel.ChartType.barClustered,bar_stacked:Excel.ChartType.barStacked,column:Excel.ChartType.columnClustered,column_stacked:Excel.ChartType.columnStacked,line:Excel.ChartType.line,line_markers:Excel.ChartType.lineMarkers,pie:Excel.ChartType.pie,doughnut:Excel.ChartType.doughnut,area:Excel.ChartType.area,scatter:Excel.ChartType.xyscatter,radar:Excel.ChartType.radar},ch=sh.charts.add(types[o.chartType]||Excel.ChartType.columnClustered,rng,Excel.ChartSeriesBy.auto);if(o.title){ch.title.visible=true;ch.title.text=o.title;}ch.legend.visible=true;ch.legend.position=Excel.ChartLegendPosition.bottom;const p=o.position||{};ch.left=p.left||10;ch.top=p.top||10;ch.width=p.width||480;ch.height=p.height||300;await c.sync();});res.push({s:'ok',d:`Gráfico "${o.title||o.chartType}" creado`});break;
  case 'add_table':await Excel.run(async c=>{const t=c.workbook.worksheets.getItem(o.sheet).tables.add(c.workbook.worksheets.getItem(o.sheet).getRange(o.range),true);if(o.name)t.name=o.name;t.style=o.style||'TableStyleMedium9';t.showFilterButton=true;await c.sync();});res.push({s:'ok',d:`Tabla "${o.name}" creada`});break;
  case 'conditional_format':await Excel.run(async c=>{const r=c.workbook.worksheets.getItem(o.sheet).getRange(o.range),rl=o.rule;if(rl.type==='color_scale'){const cf=r.conditionalFormats.add(Excel.ConditionalFormatType.colorScale);cf.colorScale.criteria={minimum:{color:rl.minColor||'#F8696B',type:'LowestValue'},midpoint:{color:rl.midColor||'#FFEB84',type:'Percentile',value:50},maximum:{color:rl.maxColor||'#63BE7B',type:'HighestValue'}};}else if(rl.type==='data_bar')r.conditionalFormats.add(Excel.ConditionalFormatType.dataBar);else if(rl.type==='icon_set')r.conditionalFormats.add(Excel.ConditionalFormatType.iconSet);await c.sync();});res.push({s:'ok',d:`Formato condicional en ${o.range}`});break;
  default:res.push({s:'error',d:`Desconocido: ${o.action}`});
}}catch(e){res.push({s:'error',d:e.message});}}return res;}

async function callAPI(msgs){
  const body={model:config.model,max_tokens:8192,messages:msgs};if(config.systemPrompt)body.system=config.systemPrompt;
  const r=await fetch(`https://${config.resource}.services.ai.azure.com/anthropic/v1/messages`,{method:'POST',headers:{'Content-Type':'application/json','x-api-key':config.apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify(body)});

async function sendMessage(){
  const inp=document.getElementById('userInput'),txt=inp.value.trim();
  if(!txt||isProcessing)return;
  if(!config.resource||!config.apiKey){showToast('Configura Azure Foundry','error');document.getElementById('configPanel').classList.add('open');return;}
  const w=document.getElementById('welcomeScreen');if(w)w.style.display='none';
  addMsg('user',txt);inp.value='';inp.style.height='auto';document.getElementById('btnSend').disabled=true;isProcessing=true;
  const tid=showTyping();
  try{
    updateStatus('connected','Leyendo libro...');const wb=await readFullWorkbook();updateCtxInfo();
    const ctx=buildContext(wb),sys=buildSystem();
    conversationHistory.push({role:'user',content:`${sys}\n\n[LIBRO]\n${ctx}\n\n[INSTRUCCIÓN]\n${txt}`});
    if(conversationHistory.length>20)conversationHistory=conversationHistory.slice(-20);

    // Llamar a Claude con continuación automática si se corta
    updateStatus('connected','Claude pensando...');
    let fullText = '';
    let attempts = 0;
    const maxAttempts = 3;

    while(attempts < maxAttempts) {
      const resp = await callAPI(conversationHistory);
      const chunk = resp.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
      fullText += chunk;
      attempts++;

      // Si la respuesta NO fue cortada por max_tokens, terminamos
      if(resp.stop_reason !== 'max_tokens') break;

      // Si fue cortada, pedir continuación
      updateStatus('connected',`Respuesta larga, continuando (${attempts}/${maxAttempts})...`);
      conversationHistory.push({role:'assistant',content:chunk});
      conversationHistory.push({role:'user',content:'Continúa exactamente donde quedaste. Si estabas en medio de un bloque ```excel_operations, completa el JSON y cierra el bloque.'});
    }

    let aText = fullText;
    let allOps = extractOps(aText);

    // Handle read_range requests
    const rr=extractRR(aText);
    if(rr.length>0){
      updateStatus('connected',`Leyendo ${rr.length} rangos...`);let extra='';
      for(const req of rr){try{const d=await readArbitrary(req.sheet,req.range);extra+=`\n[${req.sheet}!${req.range}] (${d.rows}x${d.cols})\n`;const mr=Math.min(d.data.length,300);for(let i=0;i<mr;i++)extra+=`${d.data[i].join(' │ ')}\n`;}catch(e){extra+=`\n[ERROR: ${e.message}]\n`;}}
      conversationHistory.push({role:'assistant',content:aText});conversationHistory.push({role:'user',content:`Datos:\n${extra}\nContinúa.`});
      updateStatus('connected','Procesando...');const f=await callAPI(conversationHistory);
      const ft=f.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');conversationHistory.push({role:'assistant',content:ft});
      allOps.push(...extractOps(ft));aText+='\n\n'+ft;
    }else conversationHistory.push({role:'assistant',content:aText});

    removeTyping(tid);
    const cleanText = cleanResp(aText);
    addMsg('assistant', cleanText || 'Listo, las operaciones se están ejecutando en tu libro.');

    if(allOps.length>0){
      updateStatus('connected',`Ejecutando ${allOps.length} operaciones...`);
      const res=await execOps(allOps);
      updateCtxInfo();
      addOpResults(res);
      showToast(`${allOps.length} operaciones ejecutadas`,'success');
    } else if(aText.includes('"action"')) {
      // Había operaciones pero no se pudieron parsear
      addMsg('system','⚠ Se detectaron operaciones pero no se pudieron procesar. Pídele a Claude que repita la acción con menos filas a la vez.');
    }

    updateStatus('connected',`Conectado: ${config.model}`);
  }catch(e){removeTyping(tid);addMsg('system',`Error: ${e.message}`);updateStatus('error','Error');showToast(e.message,'error');}
  finally{isProcessing=false;document.getElementById('btnSend').disabled=!inp.value.trim();}
}

// ═══════════════════════════════════════════════════════
//  CONTEXT
// ═══════════════════════════════════════════════════════
function buildContext(bd){
  if(bd.error)return`Error: ${bd.error}`;
  let c=`Libro: ${bd.sheets.length} hojas, ${bd.strategy.totalRows?.toLocaleString()||'?'} filas\n`;
  for(const sh of bd.sheets){
    c+=`\n═══ "${sh.name}" ═══\n`;
    if(sh.empty){c+='(vacía)\n';continue;}
    c+=`${sh.address} · ${sh.rows.toLocaleString()}×${sh.cols} · ${sh.readStrategy}\n`;
    if(sh.readStrategy==='complete'&&sh.data?.length>0){c+=fmtData(sh.data,Math.min(sh.data.length,200));if(sh.data.length>200)c+=`... (+${sh.data.length-200} filas)\n`;}
    else if(sh.readStrategy==='sampled'){
      c+=`⚠ ${sh.totalRows.toLocaleString()} filas (muestreo)\n`;
      if(sh.headData?.length)c+=`PRIMERAS ${sh.headData.length}:\n${fmtData(sh.headData,sh.headData.length)}`;
      if(sh.sampleData?.length){c+=`MUESTRA (${sh.sampleData.length}):\n`;for(let i=0;i<sh.sampleData.length;i++)c+=`[F${sh.sampleRows[i]}] ${sh.sampleData[i].join(' │ ')}\n`;}
      if(sh.tailData?.length)c+=`ÚLTIMAS ${sh.tailData.length} (desde ${sh.tailStartRow}):\n${fmtData(sh.tailData,sh.tailData.length,sh.tailStartRow)}`;
      if(sh.columnStats?.length){c+=`STATS:\n`;for(const s of sh.columnStats)c+=s.type==='numeric'?`  "${s.column}": [${s.min}–${s.max}] ${s.total} filas\n`:`  "${s.column}": ~${s.uniq} únicos → ${s.samples.join(', ')}\n`;}
    }
    if(c.length>MAX_CTX){c+='\n[TRUNCADO]\n';break;}
  }
  return c;
}
function fmtData(d,max,startR){let t='';for(let i=0;i<Math.min(d.length,max);i++)t+=`[F${startR?startR+i:i+1}] ${d[i].join(' │ ')}\n`;return t;}

// ── PARSERS ──
function extractOps(t){
  const o=[];
  // 1) Bloques etiquetados excel_operations (cerrados correctamente)
  const rx1=/```excel_operations\s*\n?([\s\S]*?)```/g;let m;
  while((m=rx1.exec(t))!==null){ parseAndPush(m[1].trim(), o); }
  // 2) Bloques excel_operations que se cortaron (sin cierre ```)
  if(o.length===0){
    const rx1b=/```excel_operations\s*\n?([\s\S]+)$/gm;
    while((m=rx1b.exec(t))!==null){ parseAndPush(m[1].trim(), o); }
  }
  // 3) Cualquier bloque con JSON que contenga "action"
  if(o.length===0){
    const rx2=/```(?:json|javascript|excel|js)?\s*\n?(\[[\s\S]*?\])\s*```/g;
    while((m=rx2.exec(t))!==null){try{const p=JSON.parse(m[1].trim());if(Array.isArray(p)&&p.length>0&&p[0].action)o.push(...p);}catch(e){}}
  }
  // 4) Bloques genéricos truncados con "action"
  if(o.length===0){
    const rx3=/```(?:json|javascript|excel|js)?\s*\n?(\[[\s\S]*"action"[\s\S]*)$/gm;
    while((m=rx3.exec(t))!==null){ parseAndPush(m[1].trim(), o); }
  }
  return o;
}

function parseAndPush(jsonStr, arr){
  // Intento directo
  try{ const p=JSON.parse(jsonStr); if(Array.isArray(p)){arr.push(...p);return;} }catch(e){}
  // Reparación de JSON truncado: intentar cerrar el array
  let fixed = jsonStr;
  // Quitar última coma colgante y objetos incompletos
  fixed = fixed.replace(/,\s*\{[^}]*$/, '');   // Quitar último objeto incompleto
  fixed = fixed.replace(/,\s*$/, '');            // Quitar coma final
  if(!fixed.endsWith(']')) fixed += ']';          // Cerrar array
  if(!fixed.startsWith('[')) fixed = '[' + fixed; // Abrir array
  try{ const p=JSON.parse(fixed); if(Array.isArray(p)){arr.push(...p.filter(x=>x&&x.action));return;} }catch(e){}
  // Último intento: extraer objetos individuales con regex
  const objRx=/\{[^{}]*"action"\s*:\s*"[^"]+?"[^{}]*\}/g;
  let match;
  while((match=objRx.exec(jsonStr))!==null){
    try{const obj=JSON.parse(match[0]);if(obj.action)arr.push(obj);}catch(e){}
  }
}

function extractRR(t){const r=[],rx=/```read_range\s*\n?([\s\S]*?)```/g;let m;while((m=rx.exec(t))!==null){try{const p=JSON.parse(m[1].trim());if(p.sheet&&p.range)r.push(p);}catch(e){}}return r;}
function cleanResp(t){
  let clean=t.replace(/```excel_operations[\s\S]*?```/g,'').replace(/```read_range[\s\S]*?```/g,'');
  // Limpiar bloques excel_operations truncados (sin cierre)
  clean=clean.replace(/```excel_operations[\s\S]*$/g,'');
  // Limpiar cualquier bloque con JSON de operaciones
  clean=clean.replace(/```(?:json|javascript|excel|js)?\s*\n?\[[\s\S]*?"action"[\s\S]*?(?:\][\s\S]*?```|$)/g,'');
  clean=clean.replace(/\n{3,}/g,'\n\n');
  return clean.trim();
}

// ═══════════════════════════════════════════════════════
//  RICH RENDERING
// ═══════════════════════════════════════════════════════
function fmtMd(text){
  // Markdown tables → rich HTML tables
  text=text.replace(/(?:^|\n)((?:\|[^\n]+\|\n?)+)/gm,match=>{
    const lines=match.trim().split('\n').filter(l=>l.trim());
    if(lines.length<2)return match;
    const sepIdx=lines.findIndex(l=>/^\|[\s\-:|]+\|$/.test(l.trim()));
    const hLine=sepIdx>0?lines[sepIdx-1]:lines[0], dStart=sepIdx>=0?sepIdx+1:1;
    const parse=l=>l.split('|').filter((_,i,a)=>i>0&&i<a.length-1).map(c=>c.trim());
    const hds=parse(hLine);
    let h='<table class="rich-table"><thead><tr>';hds.forEach(x=>h+=`<th>${x}</th>`);h+='</tr></thead><tbody>';
    for(let i=dStart;i<lines.length;i++){const cells=parse(lines[i]);if(!cells.length)continue;h+='<tr>';cells.forEach(c=>{const isN=/^[\-\$€£]?[\d,.\s]+%?$/.test(c.replace(/\s/g,'')),isNeg=/^-|\(/.test(c.trim());h+=`<td class="${isN?'num':''}${isNeg&&isN?' negative':''}">${c}</td>`;});h+='</tr>';}
    return h+'</tbody></table>';
  });
  // Stat cards
  text=text.replace(/\[STAT:label=([^,]+),value=([^,\]]+)(?:,sub=([^\]]+))?\]/g,(_,l,v,s)=>`<div class="stat-card"><div class="label">${l}</div><div class="value">${v}</div>${s?`<div class="sub${s.trim().startsWith('-')?' neg':''}">${s}</div>`:''}</div>`);
  text=text.replace(/((?:<div class="stat-card">[\s\S]*?<\/div>\s*){2,})/g,'<div class="stat-cards">$1</div>');
  // Bar indicators
  text=text.replace(/([█▓▒░]+)\s*(\d+%?)/g,(_,b,v)=>{const p=parseInt(v);return`<div style="display:flex;align-items:center;gap:8px;margin:2px 0"><div style="background:linear-gradient(90deg,var(--primary),var(--accent-green));height:12px;border-radius:3px;width:${Math.min(p,100)}%;min-width:4px"></div><span style="font-size:11px;color:var(--text-muted)">${v}</span></div>`;});
  // Code blocks, inline code, bold, italic, headings, hr
  text=text.replace(/```(\w+)?\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  text=text.replace(/`([^`]+)`/g,'<code>$1</code>');
  text=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  text=text.replace(/\*(.+?)\*/g,'<em>$1</em>');
  text=text.replace(/^### (.+)$/gm,'<p style="font-size:14px;font-weight:700;color:var(--primary);margin:10px 0 4px">$1</p>');
  text=text.replace(/^## (.+)$/gm,'<p style="font-size:15px;font-weight:700;color:var(--text);margin:12px 0 4px">$1</p>');
  text=text.replace(/^---$/gm,'<hr style="border:none;border-top:1px solid var(--border);margin:10px 0">');
  text=text.replace(/\n\n/g,'</p><p>');text=text.replace(/\n/g,'<br>');
  if(!text.startsWith('<'))text='<p>'+text+'</p>';
  return text;
}

// ═══════════════════════════════════════════════════════
//  UI
// ═══════════════════════════════════════════════════════
function addMsg(role,content){
  const a=document.getElementById('chatArea'),d=document.createElement('div');d.className=`message ${role}`;
  if(role==='system')d.innerHTML=fmtMd(content);
  else{const t=new Date().toLocaleTimeString('es',{hour:'2-digit',minute:'2-digit'});d.innerHTML=`<div class="msg-header"><span class="role">${role==='user'?'Tú':'Claude'}</span><span class="time">${t}</span></div><div class="msg-body">${fmtMd(content)}</div>`;}
  a.appendChild(d);a.scrollTop=a.scrollHeight;
}
function addOpResults(res){
  const a=document.getElementById('chatArea'),d=document.createElement('div');d.className='message system';
  let h='<div class="op-results">';for(const r of res){const ok=r.s==='ok';h+=`<div class="op-item"><div class="op-icon ${ok?'ok':'err'}">${ok?'✓':'✗'}</div><span>${r.d}</span></div>`;}
  d.innerHTML=h+'</div>';a.appendChild(d);a.scrollTop=a.scrollHeight;
}
function showTyping(){const a=document.getElementById('chatArea'),d=document.createElement('div'),id='t-'+Date.now();d.id=id;d.className='message assistant';d.innerHTML='<div class="typing-indicator"><span></span><span></span><span></span></div>';a.appendChild(d);a.scrollTop=a.scrollHeight;return id;}
function removeTyping(id){const e=document.getElementById(id);if(e)e.remove();}
function updateStatus(s,t){document.getElementById('statusDot').className='status-dot '+s;document.getElementById('statusText').textContent=t;}
async function updateCtxInfo(){if(!officeReady)return;try{await Excel.run(async c=>{const s=c.workbook.worksheets;s.load('items/name');await c.sync();document.getElementById('ctxSheetsCount').textContent=`${s.items.length} hojas`;});const a=await readActiveSheet();if(a&&!a.empty)document.getElementById('ctxCellsCount').textContent=`~${(a.rows*a.cols).toLocaleString()} celdas`;}catch(e){}}
function clearChat(){conversationHistory=[];const a=document.getElementById('chatArea');a.innerHTML='';const w=document.getElementById('welcomeScreen');if(w){w.style.display='';a.appendChild(w);}showToast('Chat limpiado','info');}
function showToast(m,t){const c=document.getElementById('toasts'),d=document.createElement('div');d.className=`toast ${t}`;d.textContent=m;c.appendChild(d);setTimeout(()=>d.remove(),4000);}
</script>
